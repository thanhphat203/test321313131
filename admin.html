<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Pro | Trading Insight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { accent: '#00e58f', darkBg: '#050505', darkSurface: '#0f0f11', borderLight: '#27272a' } } }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; overflow: hidden;}
        .meta-input { background: #f9fafb; border: 1px solid #d1d5db; padding: 0.85rem 1.2rem; border-radius: 12px; font-size: 0.9rem; color: #111827; transition: all 0.2s; width: 100%; box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.02);}
        .dark .meta-input { background: #0a0a0c; border: 1px solid #27272a; color: #f8fafc; }
        .meta-input:focus { border-color: #00e58f; outline: none; box-shadow: 0 0 0 3px rgba(0,229,143,0.15); }
        .md-toolbar { background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); border: 1px solid #e5e7eb; border-radius: 14px; padding: 0.4rem; display: inline-flex; gap: 0.25rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05);}
        .dark .md-toolbar { background: rgba(15,15,17,0.85); border: 1px solid #27272a; box-shadow: 0 10px 30px rgba(0,0,0,0.5);}
        .md-toolbar button { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 10px; color: #6b7280; font-size: 0.95rem; transition: all 0.2s;}
        .dark .md-toolbar button { color: #a1a1aa; }
        .md-toolbar button:hover { background-color: #f3f4f6; color: #111827; transform: translateY(-1px);}
        .dark .md-toolbar button:hover { background-color: #27272a; color: #f8fafc; }
        textarea#postContent { font-family: "Lora", serif; font-size: 1.15rem; line-height: 1.8; resize: none;}
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 6px; }
        .dark ::-webkit-scrollbar-thumb { background: #27272a; }
        ::-webkit-scrollbar-thumb:hover { background: #00e58f; }
        .preview-content { font-family: "Lora", serif; font-size: 1.05rem; line-height: 1.8; color: #374151; word-wrap: break-word;}
        .dark .preview-content { color: #d4d4d8; }
        .preview-content h2 { font-family: "Inter", sans-serif; font-weight: 800; font-size: 1.5rem; margin-top: 1.5em; margin-bottom: 0.5em; }
        .dark .preview-content h2 { color: #fff; }
        .preview-content p { margin-bottom: 1.2em; }
        .preview-content img { border-radius: 12px; width: 100%; margin: 1.5em 0; border: 1px solid #e5e7eb; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .dark .preview-content img { border: 1px solid #27272a; }
        .preview-content blockquote { font-style: italic; border-left: 4px solid #00e58f; padding-left: 1.2rem; color: #6b7280; background: rgba(0,229,143,0.05); padding: 1rem; border-radius: 0 10px 10px 0;}
        .dark .preview-content blockquote { color: #a1a1aa; }
        .toast { position: fixed; bottom: 24px; right: 24px; background: #111827; color: #fff; padding: 16px 24px; border-radius: 12px; font-weight: 600; font-size: 0.9rem; transform: translateY(100px); opacity: 0; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 9999; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);}
        .dark .toast { background: #fff; color: #050505; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .tag-badge { display: inline-flex; align-items: center; background: rgba(0,229,143,0.15); border-radius: 9999px; padding: 0.3rem 0.8rem; font-size: 0.75rem; font-weight: 600; margin-right: 0.5rem; margin-bottom: 0.5rem; color: #00c97d; }
        .tag-remove { margin-left: 0.5rem; cursor: pointer; opacity: 0.6; padding: 0 4px; border-radius: 50%;}
        .tag-remove:hover { opacity: 1; background: rgba(0,229,143,0.2); }
    </style>
</head>
<body class="bg-white text-gray-900 dark:bg-darkBg dark:text-gray-100 h-screen flex">

    <aside class="w-[280px] border-r border-gray-200 dark:border-borderLight flex flex-col bg-gray-50 dark:bg-darkBg z-10 shrink-0 transition-colors">
        <div class="h-16 border-b border-gray-200 dark:border-borderLight flex items-center px-6 shrink-0 justify-between">
            <a href="index.html" target="_blank" class="font-black text-sm tracking-tight flex items-center gap-3 hover:text-accent transition">
                <div class="w-7 h-7 bg-accent text-black rounded flex items-center justify-center text-xs shadow-md"><i class="fa-solid fa-layer-group"></i></div>
                <span>Workspace <span class="text-[10px] text-gray-500 dark:text-gray-400 align-top">PRO</span></span>
            </a>
            <button onclick="toggleTheme()" class="w-8 h-8 flex items-center justify-center rounded-lg border border-gray-200 dark:border-borderLight text-gray-500 hover:text-accent dark:text-gray-400 transition-colors">
                <i class="fas fa-moon dark:hidden"></i><i class="fas fa-sun hidden dark:inline text-yellow-400"></i>
            </button>
        </div>
        <div class="p-5 border-b border-gray-200 dark:border-borderLight">
            <button onclick="clearForm()" class="w-full bg-gray-900 hover:bg-black text-white dark:bg-white dark:hover:bg-gray-200 dark:text-black font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-2 text-sm shadow-lg hover:shadow-xl hover:-translate-y-0.5">
                <i class="fas fa-pen text-xs"></i> Viết bài mới
            </button>
        </div>
        <div class="px-5 pb-2 text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest mt-5 mb-2 flex justify-between items-center">
            <span>Quản lý nội dung</span>
            <div class="flex gap-2">
                <input type="text" id="search-posts" placeholder="Tìm kiếm..." class="bg-white dark:bg-transparent border border-gray-300 dark:border-borderLight rounded-md px-2 py-1 text-xs w-28 focus:border-accent outline-none">
            </div>
        </div>
        <div class="flex-1 overflow-y-auto px-3 space-y-1" id="post-list-sidebar"></div>
        <div class="p-4 border-t border-gray-200 dark:border-borderLight flex gap-2 shrink-0 bg-white dark:bg-darkBg">
            <input type="file" id="importFile" class="hidden" accept=".json">
            <button onclick="document.getElementById('importFile').click()" class="flex-1 text-xs font-semibold text-gray-600 dark:text-gray-400 hover:text-black dark:hover:text-white transition py-2.5 rounded-lg border border-gray-200 dark:border-borderLight hover:bg-gray-100 dark:hover:bg-darkSurface"><i class="fas fa-upload mr-1"></i> Nhập</button>
            <button onclick="exportJSON()" class="flex-1 text-xs font-semibold text-gray-600 dark:text-gray-400 hover:text-black dark:hover:text-white transition py-2.5 rounded-lg border border-gray-200 dark:border-borderLight hover:bg-gray-100 dark:hover:bg-darkSurface"><i class="fas fa-download mr-1"></i> Xuất</button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col bg-white dark:bg-darkBg relative overflow-y-auto transition-colors" id="editor-area">
        <div class="sticky top-0 bg-white/80 dark:bg-darkBg/80 backdrop-blur-xl px-8 py-4 border-b border-gray-200 dark:border-borderLight flex justify-between items-center z-10">
            <div class="flex items-center gap-3">
                <span id="save-status" class="text-xs font-medium text-gray-500 dark:text-gray-400 flex items-center gap-1.5 bg-gray-100 dark:bg-white/5 px-3 py-1.5 rounded-full"><i class="fas fa-check-circle text-accent" id="save-icon"></i> <span id="save-text">Hệ thống sẵn sàng</span></span>
            </div>
            <div class="flex gap-3">
                <button id="btn-draft" onclick="savePost('draft')" class="text-sm font-bold px-5 py-2.5 rounded-xl border border-gray-300 dark:border-borderLight text-gray-600 dark:text-gray-300 hover:text-black dark:hover:text-white hover:bg-gray-50 dark:hover:bg-darkSurface transition">Lưu nháp</button>
                <button id="btn-publish" onclick="savePost('published')" class="text-sm font-bold px-6 py-2.5 rounded-xl bg-accent text-black hover:bg-[#00c97d] transition shadow-[0_4px_14px_rgba(0,229,143,0.3)] hover:shadow-[0_6px_20px_rgba(0,229,143,0.4)] hover:-translate-y-0.5">Xuất bản ngay</button>
            </div>
        </div>

        <div class="max-w-[850px] w-full mx-auto px-8 py-10 flex-1 flex flex-col">
            <input type="hidden" id="postId">
            <input type="text" id="postTitle" spellcheck="false" class="w-full bg-transparent border-none text-[2.5rem] font-black placeholder:text-gray-300 dark:placeholder:text-borderLight focus:outline-none mb-4 leading-tight tracking-tight" placeholder="Nhập tiêu đề ấn tượng..." oninput="generateSlug()">
            <input type="text" id="postExcerpt" spellcheck="false" class="w-full bg-transparent border-none text-lg text-gray-600 dark:text-gray-400 placeholder:text-gray-400 dark:placeholder:text-gray-600 focus:outline-none mb-8 font-serif" placeholder="Viết đoạn tóm tắt dẫn dắt người đọc...">

            <div class="md-toolbar sticky top-24 z-20 flex flex-wrap gap-1 mb-8">
                <button onclick="insertFormat('**', '**')" title="Bold"><i class="fas fa-bold"></i></button>
                <button onclick="insertFormat('*', '*')" title="Italic"><i class="fas fa-italic"></i></button>
                <div class="w-px h-6 bg-gray-300 dark:bg-borderLight mx-1 self-center"></div>
                <button onclick="insertFormat('## ', '')" title="Heading 2"><i class="fas fa-heading text-sm"></i><span class="text-xs ml-0.5">2</span></button>
                <button onclick="insertFormat('### ', '')" title="Heading 3"><i class="fas fa-heading text-xs"></i><span class="text-xs ml-0.5">3</span></button>
                <div class="w-px h-6 bg-gray-300 dark:bg-borderLight mx-1 self-center"></div>
                <button onclick="insertFormat('> ', '')" title="Quote"><i class="fas fa-quote-right"></i></button>
                <button onclick="insertFormat('- ', '')" title="Bullet List"><i class="fas fa-list-ul"></i></button>
                <div class="w-px h-6 bg-gray-300 dark:bg-borderLight mx-1 self-center"></div>
                <button onclick="insertFormat('[', '](https://)')" title="Link"><i class="fas fa-link"></i></button>
                <button onclick="insertFormat('![Alt text](', ')')" title="Image"><i class="far fa-image"></i></button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-xs font-bold text-gray-500 dark:text-gray-400 mb-2 uppercase tracking-wide">URL Slug</label>
                    <input type="text" id="postSlug" class="meta-input" placeholder="url-tu-dong">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 dark:text-gray-400 mb-2 uppercase tracking-wide">Chuyên mục</label>
                    <select id="postCategory" class="meta-input font-semibold">
                        <option value="Intelligence">Intelligence</option>
                        <option value="Markets">Markets</option>
                        <option value="On-Chain Data">On-Chain Data</option>
                        <option value="Research">Research</option>
                    </select>
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-xs font-bold text-gray-500 dark:text-gray-400 mb-2 uppercase tracking-wide">Tags (cách nhau bằng dấu phẩy)</label>
                <input type="text" id="postTags" class="meta-input" placeholder="Bitcoin, Ethereum, On-Chain...">
                <div id="tags-preview" class="mt-3 flex flex-wrap"></div>
            </div>

            <div class="mb-8">
                <label class="block text-xs font-bold text-gray-500 dark:text-gray-400 mb-2 uppercase tracking-wide">URL Ảnh bìa</label>
                <input type="text" id="postImage" class="meta-input" placeholder="Nhập link ảnh hoặc Paste ảnh trực tiếp vào đây..." oninput="updatePreviewImage()">
            </div>

            <textarea id="postContent" spellcheck="false" rows="18" class="w-full flex-1 bg-transparent focus:outline-none placeholder:text-gray-300 dark:placeholder:text-borderLight" placeholder="Bắt đầu câu chuyện của bạn bằng Markdown..." oninput="updatePreview()"></textarea>
        </div>
    </div>

    <div class="w-[450px] xl:w-[500px] bg-gray-50 dark:bg-darkSurface overflow-y-auto hidden lg:flex flex-col border-l border-gray-200 dark:border-borderLight shrink-0 transition-colors">
        <div class="sticky top-0 bg-gray-50/90 dark:bg-darkSurface/90 backdrop-blur-xl border-b border-gray-200 dark:border-borderLight px-6 py-4 flex justify-between items-center z-10">
            <h3 class="text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest flex items-center gap-2"><i class="far fa-eye text-accent"></i> Xem trước & Cấu hình</h3>
        </div>
        <div class="p-6 xl:p-8 space-y-8">
            <img id="prev-image" src="" class="w-full rounded-2xl mb-5 hidden object-cover border border-gray-200 dark:border-borderLight aspect-video shadow-lg">
            <h1 id="prev-title" class="text-2xl font-bold mb-6 leading-tight font-sans tracking-tight">Tiêu đề bài viết...</h1>
            <div id="preview-pane" class="preview-content">
                <p class="text-gray-400 italic font-sans text-sm">Nội dung xem trước sẽ hiển thị tại đây...</p>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"><i class="fas fa-check-circle text-accent text-lg"></i> <span id="toast-msg">Thành công</span></div>

    <script>
        // CẤU HÌNH GITHUB API (ĐỂ TỰ ĐỘNG ĐĂNG BÀI LÊN MẠNG)
        const GITHUB_TOKEN = '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'; 
        const GITHUB_USER = 'thanhphat203'; 
        const GITHUB_REPO = 'test321313131'; // Ví dụ: 121231212412124 hoặc test321313131
        const FILE_PATH = 'data/posts.json';

        // API Ảnh (Giữ nguyên)
        const IMGBB_API_KEY = '850e50d51f7bb9ea3cf39f9dd54942ec';

        // Dark mode init
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'light') document.documentElement.classList.remove('dark');
        else document.documentElement.classList.add('dark');

        const LOCAL_KEY = 'crypto_posts';
        const DRAFT_KEY = 'crypto_draft_backup';
        let posts = [];
        const els = {
            id: document.getElementById('postId'), title: document.getElementById('postTitle'),
            exc: document.getElementById('postExcerpt'), slug: document.getElementById('postSlug'),
            cat: document.getElementById('postCategory'), img: document.getElementById('postImage'),
            tags: document.getElementById('postTags'), content: document.getElementById('postContent'),
            prevTitle: document.getElementById('prev-title'), prevImg: document.getElementById('prev-image'),
            prevPane: document.getElementById('preview-pane')
        };
        const ADMIN_PASS = 'tradinginsight123';

        async function init() {
            const pwd = prompt("🔐 Nhập mật khẩu truy cập Workspace:", "");
            if(pwd !== ADMIN_PASS) { alert("Sai mật khẩu!"); window.location.href = "index.html"; return; }
            try {
                // Ưu tiên tải dữ liệu trực tiếp từ GitHub để đồng bộ máy này và máy khác
                if(GITHUB_TOKEN !== 'THAY_BANG_TOKEN_CUA_BAN') {
                    const res = await fetch(`https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${FILE_PATH}?v=` + new Date().getTime());
                    if(res.ok) posts = await res.json();
                } else {
                    let localData = localStorage.getItem(LOCAL_KEY);
                    if(localData) posts = JSON.parse(localData);
                }
            } catch(e) { 
                let localData = localStorage.getItem(LOCAL_KEY);
                if(localData) posts = JSON.parse(localData);
            }
            if(!Array.isArray(posts)) posts = [];
            renderSidebar(); checkDraftBackup();
            els.tags.addEventListener('input', updateTagsPreview);
        }

        function renderSidebar() {
            const search = document.getElementById('search-posts')?.value.toLowerCase() || "";
            let filtered = posts.filter(p => p.title?.toLowerCase().includes(search));
            const container = document.getElementById('post-list-sidebar');
            container.innerHTML = '';
            if(!filtered.length) { container.innerHTML = '<p class="text-xs text-gray-500 text-center py-6">Không tìm thấy bài viết</p>'; return; }
            filtered.forEach(p => {
                const statusBadge = p.status !== 'published' ? '<span class="text-[9px] bg-yellow-500/20 text-yellow-600 dark:text-yellow-500 px-2 py-0.5 rounded font-bold">NHÁP</span>' : '<span class="text-[9px] bg-accent/20 text-green-700 dark:text-accent px-2 py-0.5 rounded font-bold">PUB</span>';
                container.innerHTML += `
                    <div id="side-item-${p.id}" class="sidebar-item group p-4 rounded-xl border border-transparent hover:bg-white dark:hover:bg-darkSurface hover:shadow-sm cursor-pointer transition-all flex flex-col gap-2 relative mb-1" onclick="editPost(${p.id})">
                        <div class="flex justify-between items-start gap-2">
                            <h4 class="text-sm font-bold text-gray-700 dark:text-gray-200 group-hover:text-black dark:group-hover:text-white leading-tight line-clamp-2 pr-6">${escapeHtml(p.title)}</h4>
                            <button onclick="deletePost(${p.id}, event)" class="absolute right-3 top-4 text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition"><i class="fas fa-trash-alt text-xs"></i></button>
                        </div>
                        <div class="flex items-center gap-3 mt-1">${statusBadge} <span class="text-[10px] text-gray-500 font-medium"><i class="far fa-clock mr-1"></i>${new Date(p.date).toLocaleDateString('vi-VN')}</span></div>
                    </div>
                `;
            });
        }

        function escapeHtml(str) { return str?.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}) || ''; }

        function editPost(id) {
            const p = posts.find(x => x.id === id); if(!p) return;
            els.id.value = p.id; els.title.value = p.title; els.slug.value = p.slug; els.cat.value = p.category || 'Intelligence';
            els.img.value = p.image || ''; els.exc.value = p.excerpt || ''; els.content.value = p.content;
            els.tags.value = (p.tags || []).join(', '); updateTagsPreview(); updatePreview(); updatePreviewImage();
        }

        // HÀM CHÍNH ĐỂ LƯU VÀ TỰ ĐỘNG ĐẨY LÊN GITHUB
        async function savePost(status) {
            if(!els.title.value.trim() || !els.content.value.trim()) { alert("⚠️ Vui lòng nhập ít nhất Tiêu đề và Nội dung bài viết!"); return; }
            
            const btnPublish = document.getElementById('btn-publish');
            btnPublish.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang đẩy lên web...';
            btnPublish.disabled = true;

            const isEdit = els.id.value !== "";
            const postId = isEdit ? parseInt(els.id.value) : Date.now();
            const tags = els.tags.value.split(',').map(t => t.trim()).filter(t => t);
            const postObj = {
                id: postId, title: els.title.value, slug: els.slug.value.trim() || String(postId),
                category: els.cat.value, image: els.img.value, excerpt: els.exc.value, content: els.content.value,
                author: "Trading Insight Team", date: isEdit ? posts.find(p=>p.id===postId)?.date : new Date().toISOString(),
                status, tags
            };
            
            if(isEdit) { const idx = posts.findIndex(p => p.id === postId); if(idx !== -1) posts[idx] = postObj; } 
            else { posts.unshift(postObj); els.id.value = postId; }
            
            // Lưu vào máy cục bộ trước
            localStorage.setItem(LOCAL_KEY, JSON.stringify(posts));
            renderSidebar();

            // Nếu chưa điền Token thì chỉ báo lưu cục bộ
            if (!GITHUB_TOKEN || GITHUB_TOKEN === 'THAY_BANG_TOKEN_CUA_BAN') {
                alert("Đã lưu cục bộ! Để web tự động cập nhật lên mạng, vui lòng điền GITHUB_TOKEN vào file admin.html.");
                btnPublish.innerHTML = 'Xuất bản ngay'; btnPublish.disabled = false;
                return;
            }

            // TIẾN HÀNH ĐẨY LÊN GITHUB QUA API
            try {
                // Mã hóa Tiếng Việt (UTF-8) sang Base64 cho GitHub
                const contentBase64 = window.btoa(unescape(encodeURIComponent(JSON.stringify(posts, null, 2))));
                
                // Bước 1: Lấy mã SHA của file hiện tại trên GitHub (bắt buộc phải có để ghi đè)
                let sha = '';
                const getRes = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                if (getRes.ok) { const data = await getRes.json(); sha = data.sha; }

                // Bước 2: Bắn file mới lên thay thế
                const putRes = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `Auto-publish: ${els.title.value}`,
                        content: contentBase64,
                        sha: sha || undefined
                    })
                });

                if (putRes.ok) {
                    showToast(`✅ Bài viết đã lên sóng! Bạn có thể f5 trình duyệt để xem.`);
                    updateSaveStatus("Đã đẩy lên máy chủ GitHub");
                } else {
                    throw new Error("Lỗi API GitHub");
                }
            } catch (err) {
                alert("Có lỗi xảy ra khi đẩy lên GitHub! Kiểm tra lại Token hoặc Tên Repo.");
                console.error(err);
            }

            btnPublish.innerHTML = 'Xuất bản ngay';
            btnPublish.disabled = false;
        }

        async function deletePost(id, event) {
            event.stopPropagation();
            if(confirm("Thao tác này không thể hoàn tác. Xóa bài viết này?")) {
                posts = posts.filter(x => x.id !== id);
                localStorage.setItem(LOCAL_KEY, JSON.stringify(posts));
                renderSidebar(); if(els.id.value == id) clearForm();
                
                // Tự động xóa trên GitHub nếu có token
                if (GITHUB_TOKEN !== 'THAY_BANG_TOKEN_CUA_BAN') {
                    showToast("Đang xóa trên máy chủ...");
                    try {
                        const contentBase64 = window.btoa(unescape(encodeURIComponent(JSON.stringify(posts, null, 2))));
                        let sha = '';
                        const getRes = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` } });
                        if (getRes.ok) sha = (await getRes.json()).sha;
                        
                        await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`, {
                            method: 'PUT', headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ message: `Auto-delete post`, content: contentBase64, sha: sha })
                        });
                        showToast("Đã xóa vĩnh viễn!");
                    } catch(e) {}
                } else {
                    showToast("Đã xóa cục bộ!");
                }
            }
        }

        function clearForm() {
            els.id.value = ''; els.title.value = ''; els.slug.value = ''; els.img.value = ''; els.exc.value = ''; els.content.value = ''; els.tags.value = '';
            updateTagsPreview(); updatePreview(); updatePreviewImage();
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('bg-white', 'dark:bg-darkSurface', 'border-gray-200', 'dark:border-borderLight', 'shadow-sm'));
            els.title.focus();
        }

        // ... CÁC HÀM XỬ LÝ ẢNH, HIỂN THỊ TAGS, XUẤT FILE (GIỮ NGUYÊN NHƯ CŨ) ...
        function updateTagsPreview() {
            const tags = els.tags.value.split(',').map(t => t.trim()).filter(t => t);
            const container = document.getElementById('tags-preview');
            container.innerHTML = tags.map(tag => `<span class="tag-badge">#${escapeHtml(tag)}<span class="tag-remove" onclick="removeTag('${escapeHtml(tag)}')"><i class="fas fa-times"></i></span></span>`).join('');
        }
        function removeTag(tag) { let tags = els.tags.value.split(',').map(t => t.trim()).filter(t => t && t !== tag); els.tags.value = tags.join(', '); updateTagsPreview(); }
        function insertFormat(prefix, suffix) {
            const ta = els.content; const start = ta.selectionStart, end = ta.selectionEnd;
            const text = ta.value; const selected = text.substring(start, end);
            const replacement = prefix + selected + suffix;
            ta.value = text.substring(0, start) + replacement + text.substring(end);
            ta.focus();
            if(!selected) ta.selectionStart = start + prefix.length; else { ta.selectionStart = start; ta.selectionEnd = start + replacement.length; }
            updatePreview();
        }
        function updatePreview() {
            const raw = els.content.value;
            els.prevPane.innerHTML = raw ? marked.parse(raw) : '<p class="text-gray-400 italic font-sans text-sm">Bắt đầu gõ để xem trước nội dung...</p>';
            els.prevTitle.innerText = els.title.value || "Tiêu đề bài viết hiển thị ở đây...";
        }
        function updatePreviewImage() { if(els.img.value && els.img.value !== "Đang tải lên...") { els.prevImg.src = els.img.value; els.prevImg.classList.remove('hidden'); } else els.prevImg.classList.add('hidden'); }
        function generateSlug() { if(els.id.value) return; let s = els.title.value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-'); els.slug.value = s; updatePreview(); }
        function exportJSON() {
            if(!posts.length) return alert("Không có dữ liệu để xuất");
            const dataStr = JSON.stringify(posts, null, 2); const blob = new Blob([dataStr], {type: "application/json"});
            const url = URL.createObjectURL(blob); const a = document.createElement('a');
            a.href = url; a.download = `TradingInsight_Backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click(); URL.revokeObjectURL(url); showToast("Đã xuất file Backup thành công");
        }
        function updateSaveStatus(msg) {
            const txt = document.getElementById('save-text'); const icon = document.getElementById('save-icon');
            txt.innerText = msg; icon.className = "fas fa-check-circle text-accent";
            setTimeout(() => { if(txt.innerText === msg) txt.innerText = "Sẵn sàng"; }, 3000);
        }
        function checkDraftBackup() {}
        function autoSaveDraft() {}
        function showToast(msg) { const toast = document.getElementById('toast'); document.getElementById('toast-msg').innerText = msg; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 3500); }

        els.content.addEventListener('paste', async (e) => {
            const items = (e.clipboardData || window.clipboardData).items;
            for(let item of items) {
                if(item.type.indexOf('image') !== -1) {
                    e.preventDefault(); const file = item.getAsFile();
                    const start = els.content.selectionStart, end = els.content.selectionEnd;
                    const loadingText = `\n![Đang tải ảnh lên máy chủ...]()\n`;
                    els.content.value = els.content.value.substring(0, start) + loadingText + els.content.value.substring(end);
                    updatePreview();
                    const reader = new FileReader();
                    reader.onload = async (event) => {
                        const base64Data = event.target.result.split(',')[1]; 
                        try {
                            const formData = new FormData(); formData.append('image', base64Data);
                            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
                            const data = await response.json();
                            if(data.success) { els.content.value = els.content.value.replace(loadingText, `\n![Image](${data.data.url})\n`); updatePreview(); showToast("Đã tải ảnh lên thành công!"); } 
                            else throw new Error('Upload failed');
                        } catch (error) { els.content.value = els.content.value.replace(loadingText, `\n![Lỗi tải ảnh. Vui lòng thử lại]()\n`); updatePreview(); alert("Lỗi tải ảnh!"); }
                    };
                    reader.readAsDataURL(file); break;
                }
            }
        });
        
        els.img.addEventListener('paste', async (e) => {
            const items = (e.clipboardData || window.clipboardData).items;
            for(let item of items) {
                if(item.type.indexOf('image') !== -1) {
                    e.preventDefault(); els.img.value = "Đang tải lên..."; const file = item.getAsFile();
                    const reader = new FileReader();
                    reader.onload = async (event) => {
                        const base64Data = event.target.result.split(',')[1];
                        try {
                            const formData = new FormData(); formData.append('image', base64Data);
                            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
                            const data = await response.json();
                            if(data.success) { els.img.value = data.data.url; updatePreviewImage(); showToast("Đã tải ảnh bìa thành công!"); } 
                            else throw new Error();
                        } catch (error) { els.img.value = ""; alert("Lỗi tải ảnh!"); }
                    };
                    reader.readAsDataURL(file); break;
                }
            }
        });

        init();
    </script>
</body>
</html>
